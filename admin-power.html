<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理員-超級控制台</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 40px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 320px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #27ae60; }
        #log { margin-top: 15px; font-size: 13px; color: #555; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; color:#2c3e50;">🚀 系統開通工具</h2>
        <input type="text" id="uId" placeholder="設定登入帳號">
        <input type="text" id="uPw" placeholder="設定登入密碼">
        <input type="text" id="sId" placeholder="店面編號 (如: Store_01)">
        <select id="uRole">
            <option value="admin">管理員 (可改價、看報表)</option>
            <option value="staff">一般員工 (僅點餐操作)</option>
        </select>
        <button onclick="deploySystem()">立刻同步資料並開通</button>
        <div id="log">系統狀態：等待指令...</div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAjW3zo1pzJawQEMTvKKAA7AzKZp_EnL3U", 
        authDomain: "mykitchen-8d01c.firebaseapp.com", 
        projectId: "mykitchen-8d01c", 
        storageBucket: "mykitchen-8d01c.firebasestorage.app", 
        messagingSenderId: "4806148029", 
        appId: "1:4806148029:web:1201e8cc679c04430b9cd4" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function deploySystem() {
        const id = document.getElementById('uId').value;
        const pw = document.getElementById('uPw').value;
        const sid = document.getElementById('sId').value;
        const role = document.getElementById('uRole').value;
        const log = document.getElementById('log');

        if(!id || !pw || !sid) return alert("全部欄位都要填喔！");

        try {
            log.innerText = "⏳ 步驟 1: 正在寫入帳號金庫...";
            await db.collection('config').doc('users').set({
                [id]: { name: id, pw: pw, role: role, targetStore: sid }
            }, { merge: true });

            log.innerText = "⏳ 步驟 2: 正在搬運選單裝潢資料...";
            const seed = await db.collection('template_store').doc('menu').get();
            
            if (seed.exists()) {
                await db.collection('stores').doc(sid).set({
                    structure: seed.data()
                }, { merge: true });
                log.style.color = "green";
                log.innerText = "✅ 完工！現在這帳號登入後就有按鈕可以按了！";
                alert("開通完成！快去測試登入吧！");
            } else {
                log.style.color = "orange";
                log.innerText = "⚠️ 帳號開了，但資料庫裡找不到 template_store/menu 範本，所以進去會是空的！";
            }
        } catch (e) {
            log.style.color = "red";
            log.innerText = "❌ 失敗：" + e.message;
        }
    }
</script>
</body>
</html>
